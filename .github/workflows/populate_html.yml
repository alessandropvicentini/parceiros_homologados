name: Populate HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl

    - name: Process and Inject Data
      run: |
        cat << 'EOF' > process_all.py
        import pandas as pd
        import json
        import os

        def process_excel(file_path):
            if not os.path.exists(file_path):
                print(f"AVISO: Arquivo nao encontrado: {file_path}")
                return []
            try:
                df = pd.read_excel(file_path)
                df = df.dropna(how='all')
                for col in df.select_dtypes(include=['datetime64']).columns:
                    df[col] = df[col].dt.strftime('%Y-%m-%d %H:%M:%S')
                print(f"OK: {file_path} -> {len(df)} registros")
                return df.to_dict(orient='records')
            except Exception as e:
                print(f"ERRO ao processar {file_path}: {e}")
                return []

        def main():
            files = {
                "s":     "Ser - Terceiros Homologados (3) (1).xlsx",
                "t":     "TORRE (3).xlsx",
                "p":     "_Controle _ Parceiros (10).xlsx",
                "h2025": "TOP 2025.xlsx",
                "h2026": "TOP 2026.xlsx"
            }

            data = {}
            for key, path in files.items():
                rows = process_excel(path)
                data[key] = {"raw": rows, "fn": path}

            with open("index.html", "r", encoding="utf-8") as f:
                content = f.read()

            injection_script = f'<script id="injected-data">window.INJECTED_DATA = {json.dumps(data)};</script>'
            content = content.replace("</head>", f"{injection_script}\n</head>")
            content = content.replace(
                "restoreFromCache();",
                "if(window.INJECTED_DATA) loadInjectedData(); else restoreFromCache();"
            )

            load_function = """
        function loadInjectedData() {
            const data = window.INJECTED_DATA;
            if(data.s && data.s.raw.length) {
                D.s.raw = data.s.raw; D.s.fn = data.s.fn; D.s.fil = data.s.raw.slice();
                setMeta('serName',null,'Relatório SER · '+D.s.fn);
                document.getElementById('serMeta').textContent=D.s.raw.length+' registros (auto)';
                setPil('pilSer','Carregado','ok'); setLine('lineSer','loaded');
                if(document.getElementById('bSer')) document.getElementById('bSer').classList.remove('hidden');
                if(document.getElementById('sec_kpi')) document.getElementById('sec_kpi').classList.remove('hidden');
                if(document.getElementById('sec_grf')) document.getElementById('sec_grf').classList.remove('hidden');
                if(document.getElementById('sec_rnk')) document.getElementById('sec_rnk').classList.remove('hidden');
                renderTorre();
            }
            if(data.t && data.t.raw.length) {
                D.t.raw = data.t.raw; D.t.fn = data.t.fn; D.t.cols = detMod(data.t.raw);
                setMeta('torreName',null,'Torre · '+D.t.fn);
                document.getElementById('torreMeta').textContent=data.t.raw.length+' · '+data.t.cols.length+' módulos (auto)';
                setPil('pilTorre','Carregado','ok'); setLine('lineTorre','loaded');
                if(document.getElementById('bTorre')) document.getElementById('bTorre').classList.remove('hidden');
            }
            if(data.p && data.p.raw.length) {
                // --- NOVA ABORDAGEM: USANDO A SUA FUNÇÃO statusMeta() ---
                const rawParc = data.p.raw;
                D.p.raw = [];
                D.p.reforma = [];
                const statusMap = {};

                rawParc.forEach(r => {
                    const parceiro = String(r['PARCEIRO'] || r['Parceiro'] || r['parceiro'] || r['Nome'] || '').trim();
                    const stDesc = String(r['STATUS'] || r['Status'] || r['status'] || '').trim();
                    const pend = String(r['PENDENCIA'] || r['Pendência'] || r['Pendencia'] || r['pendencia'] || '').trim();
                    const obs = String(r['OBS'] || r['Obs'] || r['Observação'] || r['observacao'] || '').trim();
                    const resp = String(r['RESPONSAVEL'] || r['Responsável'] || r['Responsavel'] || r['responsavel'] || '').trim();
                    const loc = String(r['LOCALIDADE'] || r['Localidade'] || r['localidade'] || '').trim();

                    if(!parceiro && !stDesc) return; // ignora linhas em branco

                    const isReforma = stDesc.toUpperCase().includes('REFORMA');
                    
                    if(isReforma) {
                        D.p.reforma.push({
                            nome: parceiro, stKey: '__reforma__', pendencia: pend, 
                            observacao: obs, responsavel: resp, localidade: loc
                        });
                    } else {
                        // Aplica a regra de cores que você me enviou no script
                        const meta = (typeof statusMeta === 'function') ? statusMeta(stDesc) : {icon:'⚪',cardIco:'📌',color:[148,163,184],short:stDesc.toUpperCase(),order:99};
                        const stKey = stDesc.toLowerCase().replace(/[^a-z0-9]/g, '') || 'vazio';
                        
                        D.p.raw.push({
                            nome: parceiro, stDesc: stDesc, stKey: stKey, stMeta: meta,
                            pendencia: pend, observacao: obs, responsavel: resp, localidade: loc
                        });

                        // Guarda as categorias únicas para desenhar os cards
                        if(!statusMap[stKey]) {
                            statusMap[stKey] = { key: stKey, label: stDesc || 'Sem Status', meta: meta, order: meta.order };
                        }
                    }
                });

                // Ordena os cards na tela e injeta as variáveis globais finais
                D.p.statuses = Object.values(statusMap).sort((a,b) => a.order - b.order);
                D.p.fn = data.p.fn;
                D.p.activeFilter = 'all';
                D.p.view = 'cards';

                setMeta('parcName','parcMeta','Controle de Parceiros · '+D.p.fn, D.p.raw.length+' parceiros (auto)');
                setPil('pilParc','Carregado','ok'); setLine('lineParc','loaded');
                if(document.getElementById('homEmpty')) document.getElementById('homEmpty').classList.add('hidden');
                if(document.getElementById('hom_view')) document.getElementById('hom_view').classList.remove('hidden');
                if(document.getElementById('hom_kpi')) document.getElementById('hom_kpi').classList.remove('hidden');
                
                // Mágica finalmente vai acontecer
                if(typeof renderParc === 'function') renderParc();
            }
            if(data.h2025 && data.h2025.raw.length) {
                const mapped = mapHorasJson(data.h2025.raw, 2025);
                D.h.y2025.raw = mapped.rows; D.h.y2025.fn = data.h2025.fn;
                setMeta('h2025Name','h2025Meta','Relatório de Horas · '+D.h.y2025.fn, D.h.y2025.raw.length+' registros (auto)');
                setPil('pilHoras2025','Carregado','ok'); setLine('lineHoras2025','loaded');
                if(document.getElementById('bHoras2025')) document.getElementById('bHoras2025').classList.remove('hidden');
            }
            if(data.h2026 && data.h2026.raw.length) {
                const mapped = mapHorasJson(data.h2026.raw, 2026);
                D.h.y2026.raw = mapped.rows; D.h.y2026.fn = data.h2026.fn;
                setMeta('h2026Name','h2026Meta','Relatório de Horas · '+D.h.y2026.fn, D.h.y2026.raw.length+' registros (auto)');
                setPil('pilHoras2026','Carregado','ok'); setLine('lineHoras2026','loaded');
                if(document.getElementById('bHoras2026')) document.getElementById('bHoras2026').classList.remove('hidden');
            }
            if((data.h2025 && data.h2025.raw.length) || (data.h2026 && data.h2026.raw.length)) {
                mergeHorasYears(); updateYearSummary();
                if(document.getElementById('hp_kpi')) document.getElementById('hp_kpi').classList.remove('hidden');
                if(document.getElementById('hp_grf')) document.getElementById('hp_grf').classList.remove('hidden');
                renderHpFiltersBar(); applyHpFilters();
            }
        }
        """
            content = content.replace(
                "function setupListeners()",
                f"{load_function}\nfunction setupListeners()"
            )

            with open("index.html", "w", encoding="utf-8") as f:
                f.write(content)

            print("index.html atualizado com sucesso.")

        if __name__ == "__main__":
            main()
        EOF
        python
