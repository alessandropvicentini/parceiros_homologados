name: Populate HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl

    - name: Process and Inject Data
      run: |
        cat << 'EOF' > process_all.py
        import pandas as pd
        import json
        import os
        import re

        def process_excel(file_path):
            if not os.path.exists(file_path):
                print(f"AVISO: Arquivo nao encontrado: {file_path}")
                return []
            try:
                df = pd.read_excel(file_path)
                df = df.dropna(how='all')
                for col in df.select_dtypes(include=['datetime64']).columns:
                    df[col] = df[col].dt.strftime('%Y-%m-%d %H:%M:%S')
                print(f"OK: {file_path} -> {len(df)} registros")
                return df.to_dict(orient='records')
            except Exception as e:
                print(f"ERRO ao processar {file_path}: {e}")
                return []

        def get_col_val(row, *aliases):
            for a in aliases:
                for k, v in row.items():
                    if a.lower() in k.lower():
                        return str(v).strip() if pd.notnull(v) else ''
            return ''

        def main():
            files = {
                "s":     "Ser - Terceiros Homologados (3) (1).xlsx",
                "t":     "TORRE (3).xlsx",
                "p":     "_Controle _ Parceiros (10).xlsx",
                "h2025": "TOP 2025.xlsx",
                "h2026": "TOP 2026.xlsx"
            }

            data = {}
            for key, path in files.items():
                rows = process_excel(path)
                data[key] = {"raw": rows, "fn": path}

            # Processamento Específico para Parceiros / Homologação (p)
            if data["p"]["raw"]:
                raw_parceiros = []
                reforma_list = []
                status_dict = {}

                for row in data["p"]["raw"]:
                    nome = get_col_val(row, 'parceiro', 'nome')
                    status_desc = get_col_val(row, 'status')
                    pendencia = get_col_val(row, 'pendencia')
                    obs = get_col_val(row, 'obs')
                    resp = get_col_val(row, 'responsavel', 'resp')
                    loc = get_col_val(row, 'localidade')

                    st_key = re.sub(r'[^a-zA-Z0-9]', '', status_desc.lower()) if status_desc else '__unknown__'
                    
                    if 'reforma' in status_desc.lower():
                        reforma_list.append({
                            'nome': nome, 'stKey': '__reforma__', 'pendencia': pendencia, 
                            'observacao': obs, 'responsavel': resp, 'localidade': loc
                        })
                    else:
                        raw_parceiros.append({
                            'nome': nome, 'stKey': st_key, 'pendencia': pendencia, 
                            'observacao': obs, 'responsavel': resp, 'localidade': loc,
                            'stDesc': status_desc
                        })
                        if st_key not in status_dict:
                            # Tenta adivinhar a cor baseando-se no texto, ou usa cinza padrão
                            color = [96,165,250] if 'ativo' in st_key else [245,158,11] if 'pend' in st_key else [148,163,184]
                            icon = '⚪'
                            card_ico = '📌'
                            status_dict[st_key] = {'key': st_key, 'label': status_desc, 'meta': {'short': status_desc.upper(), 'color': color, 'icon': icon, 'cardIco': card_ico}}

                data["p"]["processed"] = {
                    "raw": raw_parceiros,
                    "reforma": reforma_list,
                    "statuses": list(status_dict.values())
                }


            with open("index.html", "r", encoding="utf-8") as f:
                content = f.read()

            injection_script = f'<script id="injected-data">window.INJECTED_DATA = {json.dumps(data)};</script>'
            content = content.replace("</head>", f"{injection_script}\n</head>")
            content = content.replace(
                "restoreFromCache();",
                "if(window.INJECTED_DATA) loadInjectedData(); else restoreFromCache();"
            )

            load_function = """
        function loadInjectedData() {
            const data = window.INJECTED_DATA;
