name: Populate HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # ✅ branch correta
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl

    - name: Process and Inject Data
      run: |
        cat << 'EOF' > process_all.py
        # ... (manter o mesmo script Python)
        EOF
        python process_all.py

    - name: Commit processed index.html back to main
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff --cached --quiet || git commit -m "chore: inject data into index.html [skip ci]"
        git push
