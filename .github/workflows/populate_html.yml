name: Populate HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl

    - name: Process and Inject Data
      run: |
        cat << 'EOF' > process_all.py
        import pandas as pd
        import json
        import os
        import re

        def safe_str(val):
            if val is None or (isinstance(val, float) and str(val) == 'nan'):
                return ''
            return str(val).strip()

        def process_excel_simple(file_path):
            if not os.path.exists(file_path):
                print(f"AVISO: Arquivo nao encontrado: {file_path}")
                return []
            try:
                df = pd.read_excel(file_path)
                df = df.dropna(how='all')
                for col in df.select_dtypes(include=['datetime64']).columns:
                    df[col] = df[col].dt.strftime('%Y-%m-%d %H:%M:%S')
                print(f"OK: {file_path} -> {len(df)} registros")
                return df.to_dict(orient='records')
            except Exception as e:
                print(f"ERRO ao processar {file_path}: {e}")
                return []

        def process_controle_parceiros(file_path):
            if not os.path.exists(file_path):
                print(f"AVISO: Arquivo nao encontrado: {file_path}")
                return []
            try:
                df_func = pd.read_excel(file_path, sheet_name='Funcionais', header=1)
                df_func = df_func.dropna(how='all')
                col_map = {}
                for col in df_func.columns:
                    c = str(col).strip()
                    if c == 'Unnamed: 0': col_map[col] = 'STATUS'
                    elif 'Torre' in c or c == 'Unnamed: 2': col_map[col] = 'PARCEIRO'
                    elif c == 'Unnamed: 3': col_map[col] = 'PENDENCIA'
                    elif c == 'Unnamed: 4': col_map[col] = 'RESPONSAVEL'
                    elif c == 'Unnamed: 7': col_map[col] = 'LOCALIDADE'
                    elif c == 'Unnamed: 9': col_map[col] = 'OBS'
                df_func = df_func.rename(columns=col_map)

                df_ref = pd.read_excel(file_path, sheet_name='Reforma', header=0)
                df_ref = df_ref.dropna(how='all')
                col_map2 = {}
                for col in df_ref.columns:
                    c = str(col).strip()
                    if c == 'Unnamed: 1': col_map2[col] = 'PARCEIRO'
                    elif c == 'Unnamed: 2': col_map2[col] = 'RESPONSAVEL'
                    elif c == 'Unnamed: 7': col_map2[col] = 'LOCALIDADE'
                    elif c == 'Unnamed: 8': col_map2[col] = 'UF'
                    elif c == 'Unnamed: 9': col_map2[col] = 'OBS'
                df_ref = df_ref.rename(columns=col_map2)

                rows_func = [{'STATUS': safe_str(r.get('STATUS','')), 'PARCEIRO': safe_str(r.get('PARCEIRO','')),
                              'PENDENCIA': safe_str(r.get('PENDENCIA','')), 'RESPONSAVEL': safe_str(r.get('RESPONSAVEL','')),
                              'LOCALIDADE': safe_str(r.get('LOCALIDADE','')), 'OBS': safe_str(r.get('OBS','')), '_aba': 'Funcionais'}
                             for _, r in df_func.iterrows()]
                rows_ref = [{'STATUS': 'REFORMA', 'PARCEIRO': safe_str(r.get('PARCEIRO','')),
                             'PENDENCIA': '', 'RESPONSAVEL': safe_str(r.get('RESPONSAVEL','')),
                             'LOCALIDADE': (safe_str(r.get('LOCALIDADE',''))+' '+safe_str(r.get('UF',''))).strip(),
                             'OBS': safe_str(r.get('OBS','')), '_aba': 'Reforma'}
                            for _, r in df_ref.iterrows()]

                all_rows = rows_func + rows_ref
                print(f"OK: {file_path} -> {len(rows_func)} funcionais + {len(rows_ref)} reforma = {len(all_rows)} total")
                return all_rows
            except Exception as e:
                print(f"ERRO ao processar controle parceiros {file_path}: {e}")
                return []

        def main():
            data = {
                "s":     {"raw": process_excel_simple("Ser - Terceiros Homologados (3) (1).xlsx"), "fn": "Ser - Terceiros Homologados (3) (1).xlsx"},
                "t":     {"raw": process_excel_simple("TORRE (3).xlsx"), "fn": "TORRE (3).xlsx"},
                "p":     {"raw": process_controle_parceiros("_Controle _ Parceiros (10).xlsx"), "fn": "_Controle _ Parceiros (10).xlsx"},
                "h2025": {"raw": process_excel_simple("TOP 2025.xlsx"), "fn": "TOP 2025.xlsx"},
                "h2026": {"raw": process_excel_simple("TOP 2026.xlsx"), "fn": "TOP 2026.xlsx"},
            }

            # SEMPRE ler o template limpo, nunca o index.html modificado
            with open("index.template.html", "r", encoding="utf-8") as f:
                content = f.read()

            # Injetar dados
            injection_script = f'<script id="injected-data">window.INJECTED_DATA = {json.dumps(data, ensure_ascii=False, default=str)};</script>'
            content = content.replace("</head>", f"{injection_script}\n</head>")

            # Substituir restoreFromCache pela chamada condicional (apenas UMA vez)
            content = content.replace(
                "restoreFromCache();",
                "if(window.INJECTED_DATA) loadInjectedData(); else restoreFromCache();",
                1  # substituir apenas a primeira ocorrencia (a chamada no DOMContentLoaded)
            )

            # Injetar loadInjectedData antes de setupListeners (apenas UMA vez)
            load_function = """
        function loadInjectedData() {
            const data = window.INJECTED_DATA;
            if(data.s && data.s.raw && data.s.raw.length) {
                D.s.raw = data.s.raw; D.s.fn = data.s.fn; D.s.fil = data.s.raw.slice();
                setMeta('serName',null,'Relatório SER · '+D.s.fn);
                document.getElementById('serMeta').textContent=D.s.raw.length+' registros (auto)';
                setPil('pilSer','Carregado','ok'); setLine('lineSer','loaded');
                if(document.getElementById('bSer')) document.getElementById('bSer').classList.remove('hidden');
                if(document.getElementById('sec_kpi')) document.getElementById('sec_kpi').classList.remove('hidden');
                if(document.getElementById('sec_grf')) document.getElementById('sec_grf').classList.remove('hidden');
                if(document.getElementById('sec_rnk')) document.getElementById('sec_rnk').classList.remove('hidden');
                renderTorre();
            }
            if(data.t && data.t.raw && data.t.raw.length) {
                D.t.raw = data.t.raw; D.t.fn = data.t.fn; D.t.cols = detMod(data.t.raw);
                setMeta('torreName',null,'Torre · '+D.t.fn);
                document.getElementById('torreMeta').textContent=data.t.raw.length+' · '+data.t.cols.length+' módulos (auto)';
                setPil('pilTorre','Carregado','ok'); setLine('lineTorre','loaded');
                if(document.getElementById('bTorre')) document.getElementById('bTorre').classList.remove('hidden');
            }
            if(data.p && data.p.raw && data.p.raw.length) {
                D.p.raw = data.p.raw; D.p.fn = data.p.fn;
                setMeta('parcName','parcMeta','Controle de Parceiros · '+D.p.fn, D.p.raw.length+' parceiros (auto)');
                setPil('pilParc','Carregado','ok'); setLine('lineParc','loaded');
                if(document.getElementById('homEmpty')) document.getElementById('homEmpty').classList.add('hidden');
                if(document.getElementById('hom_view')) document.getElementById('hom_view').classList.remove('hidden');
                if(document.getElementById('hom_kpi')) document.getElementById('hom_kpi').classList.remove('hidden');
                if(typeof renderParc === 'function') renderParc();
            }
            if(data.h2025 && data.h2025.raw && data.h2025.raw.length) {
                const mapped = mapHorasJson(data.h2025.raw, 2025);
                D.h.y2025.raw = mapped.rows; D.h.y2025.fn = data.h2025.fn;
                setMeta('h2025Name','h2025Meta','Relatório de Horas · '+D.h.y2025.fn, D.h.y2025.raw.length+' registros (auto)');
                setPil('pilHoras2025','Carregado','ok'); setLine('lineHoras2025','loaded');
                if(document.getElementById('bHoras2025')) document.getElementById('bHoras2025').classList.remove('hidden');
            }
            if(data.h2026 && data.h2026.raw && data.h2026.raw.length) {
                const mapped = mapHorasJson(data.h2026.raw, 2026);
                D.h.y2026.raw = mapped.rows; D.h.y2026.fn = data.h2026.fn;
                setMeta('h2026Name','h2026Meta','Relatório de Horas · '+D.h.y2026.fn, D.h.y2026.raw.length+' registros (auto)');
                setPil('pilHoras2026','Carregado','ok'); setLine('lineHoras2026','loaded');
                if(document.getElementById('bHoras2026')) document.getElementById('bHoras2026').classList.remove('hidden');
            }
            if((data.h2025 && data.h2025.raw && data.h2025.raw.length) || (data.h2026 && data.h2026.raw && data.h2026.raw.length)) {
                mergeHorasYears(); updateYearSummary();
                if(document.getElementById('hp_kpi')) document.getElementById('hp_kpi').classList.remove('hidden');
                if(document.getElementById('hp_grf')) document.getElementById('hp_grf').classList.remove('hidden');
                renderHpFiltersBar(); applyHpFilters();
            }
        }
        """
            content = content.replace("function setupListeners()", f"{load_function}\nfunction setupListeners()", 1)

            with open("index.html", "w", encoding="utf-8") as f:
                f.write(content)

            print("index.html gerado com sucesso a partir do template.")

        if __name__ == "__main__":
            main()
        EOF
        python process_all.py

    - name: Commit processed index.html back to main
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff --cached --quiet || git commit -m "chore: inject data into index.html [skip ci]"
        git push
